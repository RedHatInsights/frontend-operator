# Assert the job was recreated (new creation timestamp)
apiVersion: batch/v1
kind: Job
metadata:
  name: chrome-test-cutoff-frontend-pushcache
  namespace: test-pushcache-cutoff
  labels:
    frontend: chrome-test-cutoff
spec:
  template:
    metadata:
      annotations:
        frontend-image: quay.io/cloudservices/insights-chrome-frontend:720317c
        valpop-image: quay.io/redhat-user-workloads/hcc-platex-services-tenant/valpop:9843de0
    spec:
      initContainers:
        - name: copy-frontend-assets
          image: quay.io/cloudservices/insights-chrome-frontend:720317c
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
      containers:
        - name: valpop-pushcache
          image: quay.io/redhat-user-workloads/hcc-platex-services-tenant/valpop:9843de0
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
      restartPolicy: Never
