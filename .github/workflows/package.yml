---
name: Run Unit Tests

'on':
  - pull_request

jobs:

  testing:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/setup-go@v6
        name: Set up golang 1.25
        with:
          go-version: '1.25.10'
      - name: Check out source code
        uses: actions/checkout@v4
      - name: Install package and dependencies
        run: |
          make
      - name: Run Tests
        run: make test
