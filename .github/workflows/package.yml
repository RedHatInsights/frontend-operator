---
name: Run Unit Tests

'on':
  - pull_request

jobs:

  testing:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source code
        uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        name: Set up golang 1.2x
        with:
          go-version-file: 'go.mod'
          check-latest: false
      - name: Install package and dependencies
        run: |
          make
      - name: Run Tests
        run: make test
